# ===================================================================
# 1. Cấu hình Server
# ===================================================================
server.port=8080
server.servlet.context-path=/api

# ===================================================================
# 2. Cơ sở dữ liệu Cloud (Chuẩn hóa sang PostgreSQL của Supabase)
# ===================================================================
spring.datasource.url=jdbc:postgresql://db.jielwnthgunoqqvkprzn.supabase.co:5432/postgres
# spring.datasource.url=postgresql://postgres:2652004Vuong!@db.jielwnthgunoqqvkprzn.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=2652004Vuong!@
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# 3. Cấu hình JPA/Hibernate 
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 4. Cấu hình Bảo mật JWT
# ===================================================================
jwt.secret=your-secret-key-here-make-it-longer-and-secure-123456789
jwt.expiration=86400000

# ===================================================================
# 5. Cấu hình Lõi Trí tuệ nhân tạo (Google AI Studio - Gemini)
# ===================================================================
# API Key lấy từ Google AI Studio (Thay AIzaSy... bằng key thật của em)
gemini.api-key=AQ.Ab8RN6L9P8qZ__F370Fh-xEWy3KMIyTM1K-C5ib4rWpAewnDtA

# Cấu hình Mô hình Nhúng (Embedding) để đổi văn bản thành Vector
spring.ai.google.ai.chat.options.model=gemini-1.5-flash
spring.ai.google.ai.embedding.options.model=text-embedding-004

# ===================================================================
# 6. Cấu hình Kho lưu trữ Vector AI (pgvector trên Supabase Cloud)
# ===================================================================
spring.ai.vectorstore.pgvector.initialize-schema=true
# Đổi về 768 cho khớp chuẩn đầu ra của mô hình text-embedding-004
spring.ai.vectorstore.pgvector.dimensions=768

# ===================================================================
# 7. Cấu hình Tải file (CV Ứng viên)
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.dir=./uploads

# ===================================================================
# 8. Cấu hình Nhật ký Hệ thống (Logging)
# ===================================================================
logging.level.root=INFO
logging.level.org.springframework.ai=DEBUG
logging.level.com.project.recruitment=DEBUG

# ===================================================================
# 9. Thông tin Ứng dụng
# ===================================================================
spring.application.name=recruitment-api
app.version=1.0.0

embedding.url=http://localhost:5000/embedding
# embedding.url=http://python:5000/embedding